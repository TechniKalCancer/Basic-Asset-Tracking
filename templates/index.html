{% extends 'base.html' %}
{% block title %}Asset Tracker{% endblock %}
{% block content %}
<h1>📦 Asset Tracker</h1>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:2rem;">
  <a href="/checkin" style="text-decoration:none;">
    <div class="card" style="text-align:center;cursor:pointer;border-color:#22c55e44;transition:border-color .2s;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">✅</div>
      <div style="font-weight:700;font-size:1.1rem;">Check In</div>
      <div style="color:var(--muted);font-size:.85rem;margin-top:.3rem;">Scan asset tag or serial</div>
    </div>
  </a>
  <a href="/checkout" style="text-decoration:none;">
    <div class="card" style="text-align:center;cursor:pointer;border-color:#4f7ef844;transition:border-color .2s;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">📤</div>
      <div style="font-weight:700;font-size:1.1rem;">Check Out</div>
      <div style="color:var(--muted);font-size:.85rem;margin-top:.3rem;">Scan asset tag or serial</div>
    </div>
  </a>
  <a href="/asset_history" style="text-decoration:none;">
    <div class="card" style="text-align:center;cursor:pointer;border-color:#a855f744;transition:border-color .2s;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">📋</div>
      <div style="font-weight:700;font-size:1.1rem;">History</div>
      <div style="color:var(--muted);font-size:.85rem;margin-top:.3rem;">Look up any asset</div>
    </div>
  </a>
</div>
{% endblock %}
